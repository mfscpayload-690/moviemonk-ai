<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/asset/favicon.ico" />
  <link rel="icon" type="image/png" sizes="16x16" href="/asset/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/asset/favicon-32x32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/asset/apple-touch-icon.png" />
  <link rel="manifest" href="/asset/site.webmanifest" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Discover trending movies and TV shows, then dive deeper with MovieMonk's AI-assisted details." />
  <title>MovieMonk | Discover Movies & TV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            'brand-bg': '#121212',
            'brand-surface': '#1e1e1e',
            'brand-primary': '#6a44ff',
            'brand-secondary': '#a855f7',
            'brand-accent': '#f472b6',
            'brand-text-light': '#e5e7eb',
            'brand-text-dark': '#9ca3af',
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-in-out',
            'slide-up': 'slideUp 0.5s ease-in-out',
            'spin': 'spin 1s linear infinite',
            'skeleton-shimmer': 'skeletonShimmer 1.8s ease-in-out infinite'
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: 0 },
              '100%': { opacity: 1 },
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: 0 },
              '100%': { transform: 'translateY(0)', opacity: 1 },
            },
            spin: {
              'from': { transform: 'rotate(0deg)' },
              'to': { transform: 'rotate(360deg)' },
            },
            skeletonShimmer: {
              '0%': { backgroundPosition: '-200% 0' },
              '50%': { backgroundPosition: '200% 0' },
              '100%': { backgroundPosition: '-200% 0' },
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Custom Scrollbar for a cleaner look */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(30, 30, 30, 0.5);
    }

    ::-webkit-scrollbar-thumb {
      background: #4a4a4a;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #6a44ff;
    }

    /* Smooth mobile scrolling for chat interface */
    .chat-scroll {
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      touch-action: auto;
    }
  </style>
</head>

<body class="bg-brand-bg text-brand-text-light font-sans">
  <div id="root"></div>
  <div id="modal-root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
