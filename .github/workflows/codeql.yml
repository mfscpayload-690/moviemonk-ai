name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '15 2 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (JavaScript/TypeScript)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']

    steps:
      - name: Checkout repository
        uses: actions/checkout@07f59d58564f8494630739c9f400799863861214 # v6.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@37d45e437039014594c7764d262cc1a3089d38c6 # v4.0.0
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@37d45e437039014594c7764d262cc1a3089d38c6 # v4.0.0

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@37d45e437039014594c7764d262cc1a3089d38c6 # v4.0.0
