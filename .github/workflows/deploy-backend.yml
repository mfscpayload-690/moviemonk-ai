name: Deploy Backend to Hugging Face

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-backend.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets['HF_TOKEN'] }}
        run: |
          # Use git subtree to push only the 'server' subdirectory to Hugging Face
          git config --global user.email "bot@moviemonk.ai"
          git config --global user.name "MovieMonk CI"
          
          # Add the Hugging Face Space remote using the runtime token for seamless authentication
          git remote add hf https://__token__:$HF_TOKEN@huggingface.co/spaces/mfscpayload-690/moviemonk-backend
          
          # Split the 'server' subtree into a temporary local branch to allow force pushing
          git subtree split --prefix server -b deploy_tree
          
          # Force push the deploy_tree branch to the 'main' branch of the Space
          git push hf deploy_tree:main --force
