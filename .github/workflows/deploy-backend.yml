name: Deploy Backend to Hugging Face

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets['HF_TOKEN'] }}
        run: |
          # Use git subtree to push only the 'server' subdirectory to Hugging Face
          git config --global user.email "bot@moviemonk.ai"
          git config --global user.name "MovieMonk CI"
          
          # Add the Hugging Face Space as a remote
          git remote add hf https://mfscpayload-690:$HF_TOKEN@huggingface.co/spaces/mfscpayload-690/moviemonk-backend
          
          # Force push the 'server' directory to the 'main' branch of the Space
          git subtree push --prefix server hf main --force
