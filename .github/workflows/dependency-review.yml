name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Dependency review
        uses: actions/dependency-review-action@68c34f24305f2421385472855909183427181c00 # v4.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
