name: Regenerate package-lock.json

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@07f59d58564f8494630739c9f400799863861214 # v6.0.0
        with:
          persist-credentials: true
        
      - name: Setup Node
        uses: actions/setup-node@e2a7746817296b1c676233d45f317b2031a29369 # v6.0.0
        with:
          node-version: 22
          
      - name: Generate package-lock.json
        run: npm install
        
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore: regenerate package-lock.json" || echo "No changes to commit"
          # Rely on actions/checkout's persisted credentials for a secure push
          git push origin HEAD:main
